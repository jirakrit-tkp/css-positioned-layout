<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <header>
    <h1>Techup Chatroom</h1>
  </header>
  <main>
    <section class="chatroom">
      <ul class="chat-list">
        <li class="chat-message right">
          <span class="emoji bubble" id="hello-bubble">สวัสดีจ้า</span>
        </li>
        <li class="chat-message right">
          <span class="emoji bubble" id="coding-funny"><button class="close-btn" aria-label="close">×</button>Coding สนุกจังเลย</span>
        </li>
        <li class="chat-message right">
          <span class="emoji bubble" role="img" aria-label="😁😍">😁😍</span>
        </li>
        <li class="chat-message left">
          <span class="emoji bubble" role="img" aria-label="smiling face with heart-eyes">😍</span>
        </li>
        <li class="chat-message left">
          <span class="emoji bubble" role="img" aria-label="waving hand">👋</span>
        </li>
      </ul>
    </section>
  </main>
</body>

</html>
