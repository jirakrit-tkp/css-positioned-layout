<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techup Chatroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="chat-header">Techup Chatroom</header>
  <main class="chat-container">
    <div class="chat-left">
      <div class="emoji-bubble">😍</div>
      <div class="emoji-bubble">🥳</div>
    </div>
    <div class="chat-right">
      <div class="chat-bubble green">
        <span>สวัสดีจ้า</span>
      </div>
      <div class="chat-bubble gray">
        <span>Coding สนุกจังเลย</span>
        <button class="close-btn">×</button>
      </div>
      <div class="emoji-row">
        <span>🥳</span>
        <span>😍</span>
      </div>
    </div>
  </main>
</body>
</html>
